services:
  pricewise-api:
    image: ${PRICEWISE_API_IMAGE:-pricewise-api:prod}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Database__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Redis__Enabled: ${REDIS_ENABLED:-true}
      Redis__ConnectionString: redis:6379
      Jwt__Issuer: ${JWT_ISSUER:-PriceWise}
      Jwt__Audience: ${JWT_AUDIENCE:-PriceWise}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__AccessTokenExpirationMinutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-30}
      Jwt__RefreshTokenExpirationDays: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-7}
      AuthenticationSecurity__MaxFailedLoginAttempts: ${AUTHENTICATION_SECURITY_MAX_FAILED_LOGIN_ATTEMPTS:-5}
      AuthenticationSecurity__LockoutMinutes: ${AUTHENTICATION_SECURITY_LOCKOUT_MINUTES:-15}
      AdminSeed__Enabled: ${ADMIN_SEED_ENABLED:-false}
      Telemetry__Enabled: ${TELEMETRY_ENABLED:-true}
      Telemetry__ServiceName: ${TELEMETRY_SERVICE_NAME:-PriceWise.Api}
      Telemetry__ServiceVersion: ${TELEMETRY_SERVICE_VERSION:-1.0.0}
      Telemetry__Exporter: ${TELEMETRY_EXPORTER:-OTLP}
      Telemetry__OtlpEndpoint: ${TELEMETRY_OTLP_ENDPOINT:-http://jaeger:4317}
      Telemetry__EnableMetrics: ${TELEMETRY_ENABLE_METRICS:-true}
      Telemetry__EnableTracing: ${TELEMETRY_ENABLE_TRACING:-true}
      PriceCheck__Enabled: ${PRICE_CHECK_ENABLED:-true}
      PriceCheck__IntervalInMinutes: ${PRICE_CHECK_INTERVAL_IN_MINUTES:-30}
      PriceCheck__MaxProductsPerExecution: ${PRICE_CHECK_MAX_PRODUCTS_PER_EXECUTION:-50}
      PriceProvider__MinimumBasePrice: ${PRICE_PROVIDER_MINIMUM_BASE_PRICE:-50}
      PriceProvider__MaximumBasePrice: ${PRICE_PROVIDER_MAXIMUM_BASE_PRICE:-1500}
      PriceProvider__VariationPercentage: ${PRICE_PROVIDER_VARIATION_PERCENTAGE:-0.03}
      Outbox__Enabled: ${OUTBOX_ENABLED:-true}
      Outbox__IntervalInSeconds: ${OUTBOX_INTERVAL_IN_SECONDS:-30}
      Outbox__MaxRetries: ${OUTBOX_MAX_RETRIES:-5}
      Outbox__BatchSize: ${OUTBOX_BATCH_SIZE:-20}
      RateLimiting__Enabled: ${RATE_LIMITING_ENABLED:-true}
      RateLimiting__LoginPermitLimit: ${RATE_LIMITING_LOGIN_PERMIT_LIMIT:-5}
      RateLimiting__LoginWindowInMinutes: ${RATE_LIMITING_LOGIN_WINDOW_IN_MINUTES:-1}
      RateLimiting__RefreshTokenPermitLimit: ${RATE_LIMITING_REFRESH_TOKEN_PERMIT_LIMIT:-10}
      RateLimiting__RefreshTokenWindowInMinutes: ${RATE_LIMITING_REFRESH_TOKEN_WINDOW_IN_MINUTES:-1}
      RateLimiting__GeneralPermitLimit: ${RATE_LIMITING_GENERAL_PERMIT_LIMIT:-100}
      RateLimiting__GeneralWindowInMinutes: ${RATE_LIMITING_GENERAL_WINDOW_IN_MINUTES:-1}
      RateLimiting__PriceCheckPermitLimit: ${RATE_LIMITING_PRICE_CHECK_PERMIT_LIMIT:-3}
      RateLimiting__PriceCheckWindowInMinutes: ${RATE_LIMITING_PRICE_CHECK_WINDOW_IN_MINUTES:-5}
      DataSeed__Enabled: ${DATA_SEED_ENABLED:-false}
      WebhookNotifications__Enabled: ${WEBHOOK_NOTIFICATIONS_ENABLED:-true}
      WebhookNotifications__TimeoutInSeconds: ${WEBHOOK_NOTIFICATIONS_TIMEOUT_IN_SECONDS:-10}
      WebhookNotifications__MaxRetryAttempts: ${WEBHOOK_NOTIFICATIONS_MAX_RETRY_ATTEMPTS:-3}
      EmailNotifications__Enabled: ${EMAIL_NOTIFICATIONS_ENABLED:-false}
      EmailNotifications__Host: ${EMAIL_NOTIFICATIONS_HOST:-}
      EmailNotifications__Port: ${EMAIL_NOTIFICATIONS_PORT:-587}
      EmailNotifications__UseSsl: ${EMAIL_NOTIFICATIONS_USE_SSL:-true}
      EmailNotifications__UserName: ${EMAIL_NOTIFICATIONS_USERNAME:-}
      EmailNotifications__Password: ${EMAIL_NOTIFICATIONS_PASSWORD:-}
      EmailNotifications__FromName: ${EMAIL_NOTIFICATIONS_FROM_NAME:-PriceWise}
      EmailNotifications__FromEmail: ${EMAIL_NOTIFICATIONS_FROM_EMAIL:-noreply@pricewise.local}
      EmailNotifications__TimeoutInSeconds: ${EMAIL_NOTIFICATIONS_TIMEOUT_IN_SECONDS:-10}
      EmailNotifications__MaxRetryAttempts: ${EMAIL_NOTIFICATIONS_MAX_RETRY_ATTEMPTS:-3}
      CsvExport__MaxRows: ${CSV_EXPORT_MAX_ROWS:-10000}
      CsvExport__DateFormat: "${CSV_EXPORT_DATE_FORMAT:-yyyy-MM-dd HH:mm:ss}"
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c \"exec 3<>/dev/tcp/127.0.0.1/8080; printf 'GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pricewise-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - pricewise-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pricewise-postgres-data:
  pricewise-redis-data:
