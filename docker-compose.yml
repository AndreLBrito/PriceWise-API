services:
  postgres:
    image: postgres:18-alpine
    container_name: pricewise-postgres
    environment:
      POSTGRES_DB: pricewise
      POSTGRES_USER: pricewise
      POSTGRES_PASSWORD: pricewise
    ports:
      - "5432:5432"
    volumes:
      - pricewise-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pricewise-redis
    ports:
      - "6379:6379"
    volumes:
      - pricewise-redis-data:/data

volumes:
  pricewise-postgres-data:
  pricewise-redis-data:
